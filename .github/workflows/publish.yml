name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    permissions:
      packages: write   # push to GitHub Packages (nightly builds)
      contents: write   # upload assets to a GitHub Release
      id-token: write   # obtain a short-lived OIDC token for NuGet trusted publishing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Nerdbank.GitVersioning needs full git history to compute the version

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          # Configure GitHub Packages as an authenticated NuGet source so nightly packages
          # can be pushed without a separate `dotnet nuget add source` step.
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ github.token }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release --warnaserror

      - name: Pack
        run: |
          PACK_ARGS="--no-build --configuration Release --output ./artifacts"
          dotnet pack $PACK_ARGS

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
          if-no-files-found: error

      # ── Manual execution ────────────────────────────────────────────────────────
      - name: Push to GitHub Packages
        if: github.event_name == 'workflow_dispatch'
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ github.token }}" \
            --skip-duplicate

      # ── Stable release (published GitHub Release with a vX.Y.Z tag) ────────────
      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            ./artifacts/*.nupkg \
            --repo "${{ github.repository }}"

      - name: Push to NuGet.org
        if: github.event_name == 'release'
        run: |
          NUGET_TOKEN=$(curl -sSfL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            | jq -r .value)
          if [[ -z "$NUGET_TOKEN" || "$NUGET_TOKEN" == "null" ]]; then
            echo "::error::Failed to obtain OIDC token from GitHub — check that id-token: write is set and the workflow is running in a context where OIDC is available."
            exit 1
          fi
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
