name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate, pack, and publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer requires full tag history to calculate the package version.

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ github.token }}

      - name: Validate release metadata
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag is not a supported Semantic Versioning tag: $RELEASE_TAG" >&2
            exit 1
          fi

          release_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$release_commit" != "$head_commit" ]]; then
            echo "Release tag $RELEASE_TAG does not point to the checked-out commit." >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" == *-* ]]; then
            if [[ "$RELEASE_IS_PRERELEASE" != "true" ]]; then
              echo "Prerelease tag $RELEASE_TAG must be published as a GitHub prerelease." >&2
              exit 1
            fi
          elif [[ "$RELEASE_IS_PRERELEASE" != "false" ]]; then
            echo "Stable tag $RELEASE_TAG must not be published as a GitHub prerelease." >&2
            exit 1
          fi

      - name: Restore
        run: dotnet restore

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release --warnaserror

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/MinimalOpenAPI/MinimalOpenAPI.csproj \
            --no-build \
            --configuration Release \
            --output ./artifacts

      - name: Validate package contents
        run: bash scripts/validate-package.sh ./artifacts

      - name: Restore package-consumption smoke test
        run: dotnet restore sample/SmokeTest/SmokeTest.csproj --force --no-cache

      - name: Build package-consumption smoke test
        run: |
          dotnet build sample/SmokeTest/SmokeTest.csproj \
            --no-restore \
            --configuration Release \
            --warnaserror

      - name: Publish package-consumption smoke test
        run: |
          dotnet publish sample/SmokeTest/SmokeTest.csproj \
            --no-restore \
            --configuration Release \
            --output /tmp/minimalopenapi-smoke

      - name: Verify authored schema in publish output
        run: |
          find /tmp/minimalopenapi-smoke/openapi/schemas -name 'openapi.yaml' \
            | grep -q .

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          if-no-files-found: error

      - name: Push to GitHub Packages
        if: github.event_name == 'workflow_dispatch'
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ github.token }}" \
            --skip-duplicate

      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            ./artifacts/*.nupkg \
            ./artifacts/*.snupkg \
            --repo "${{ github.repository }}"

      - name: NuGet login
        if: github.event_name == 'release'
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: Kralizek

      - name: Push to NuGet.org
        if: github.event_name == 'release'
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
