name: Smoke Test (package consumption)

# Validates that the packed NuGet artifacts can be consumed by a clean downstream
# project using PackageReference rather than project references.

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs the full tag history to calculate the package version.

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release --warnaserror

      - name: Pack package into artifacts
        run: |
          dotnet pack src/MinimalOpenAPI/MinimalOpenAPI.csproj \
            --no-build \
            --configuration Release \
            --output artifacts

      - name: Validate package contents
        run: bash scripts/validate-package.sh artifacts

      - name: Restore smoke-test consumer
        run: dotnet restore sample/SmokeTest/SmokeTest.csproj --force --no-cache

      - name: Build smoke-test consumer
        run: |
          dotnet build sample/SmokeTest/SmokeTest.csproj \
            --no-restore \
            --configuration Release \
            --warnaserror

      - name: Publish smoke-test consumer
        run: |
          dotnet publish sample/SmokeTest/SmokeTest.csproj \
            --no-restore \
            --configuration Release \
            --output /tmp/smoketest-publish

      - name: Verify OpenAPI spec is in publish output
        run: |
          find /tmp/smoketest-publish/openapi/schemas -name 'openapi.yaml' \
            | grep -q .