name: Bug Report
description: Something is not working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough information to reproduce the behavior from a clean project.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which NuGet package is affected?
      placeholder: MinimalOpenAPI
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: .NET SDK / runtime version
      placeholder: e.g. .NET SDK 10.0.200
    validations:
      required: true

  - type: input
    id: aspnetcore
    attributes:
      label: ASP.NET Core version
      placeholder: e.g. ASP.NET Core 10.0.4
    validations:
      required: true

  - type: textarea
    id: openapi
    attributes:
      label: Minimal OpenAPI document
      description: Include the smallest YAML or JSON document that reproduces the problem. Remove credentials and private data.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: project
    attributes:
      label: Project configuration and generated-code context
      description: Include the relevant PackageReference, OpenApi item metadata, handler implementation, diagnostics, or generated source snippets.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide exact build or runtime steps, or link to a minimal reproduction repository.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, diagnostic IDs, screenshots, related issues, or other useful context.
