name: Bug Report
description: Something is not working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which NuGet package is affected?
      placeholder: e.g. MinimalOpenAPI, MinimalOpenAPI.Runtime
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.0.0-beta.1
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: .NET SDK / runtime version
      placeholder: e.g. .NET 9.0.4
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction — ideally a code snippet or a link to a repo.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues, etc.
