name: Security Report
description: Report a potential security vulnerability.
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **This issue will be visible to repository maintainers.**
        > Please **do not** include live credentials, private keys, tokens, or any sensitive material
        > that is not strictly necessary to describe the vulnerability.
        >
        > See [SECURITY.md](../../blob/master/SECURITY.md) for the full policy.

  - type: input
    id: package
    attributes:
      label: Affected package(s)
      placeholder: e.g. MinimalOpenAPI, MinimalOpenAPI.Runtime
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Affected version(s)
      placeholder: e.g. 1.0.0-beta.1, all prereleases
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Vulnerability description
      description: Describe the security issue without including sensitive material.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can the vulnerability be triggered?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is the potential impact if exploited?
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested mitigation (optional)
      description: Any ideas on how the issue could be fixed or mitigated.
