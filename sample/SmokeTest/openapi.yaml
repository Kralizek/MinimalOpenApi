openapi: "3.0.0"
info:
  title: Smoke Test API
  version: "1.0.0"
paths:
  /ping:
    get:
      operationId: ping
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /labels:
    put:
      operationId: setLabels
      summary: Attach typed labels to a resource
      description: >
        Demonstrates inline complex additionalProperties: the request body has a
        `labels` property whose value schema is an inline object, causing the
        generator to emit a `RequestLabelsValue` nested record and type the
        property as `Dictionary<string, RequestLabelsValue>`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resourceId
              properties:
                resourceId:
                  type: string
                  format: uuid
                labels:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      name:
                        type: string
                      color:
                        type: string
                        nullable: true
      responses:
        "204":
          description: No Content
  /accounts:
    post:
      operationId: createAccount
      summary: Create an account with request/response directional fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
  /tenants/{tenantId}/items:
    get:
      operationId: getTenantItems
      summary: List items for a tenant
      description: >
        Demonstrates a path parameter resolved from a reusable components/parameters entry.
        The tenantId path parameter is defined under components/parameters and referenced
        via $ref, exercising the component parameter resolution pipeline in the shipped package.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Account:
      type: object
      required:
        - id
        - email
        - password
        - profile
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
        password:
          type: string
          writeOnly: true
        profile:
          $ref: '#/components/schemas/Profile'
    Profile:
      type: object
      required:
        - createdAt
      properties:
        createdAt:
          type: string
          format: date-time
          readOnly: true
        displayName:
          type: string
