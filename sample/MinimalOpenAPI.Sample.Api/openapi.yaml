openapi: "3.0.0"
info:
  title: Sample API
  version: "1.0.0"
paths:
  /tenants/{tenantId}/clients/{clientId}:
    get:
      operationId: getClient
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        "404":
          description: Not found
  /tenants/{tenantId}/clients:
    post:
      operationId: createClient
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        "400":
          description: Bad Request
components:
  schemas:
    Client:
      type: object
      required:
        - id
        - tenantId
        - name
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        vatNumber:
          type: string
          nullable: true
    CreateClientRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        vatNumber:
          type: string
          nullable: true
