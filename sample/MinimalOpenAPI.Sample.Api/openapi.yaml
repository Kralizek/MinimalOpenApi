openapi: "3.0.0"
info:
  title: Todo API
  version: "1.0.0"
paths:
  /echo:
    get:
      operationId: echo
      summary: Echo the X-Correlation-Id header back in the response body
      description: Used to verify that header binding is case-insensitive at runtime.
      tags:
        - echo
      parameters:
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /todos:
    get:
      operationId: listTodos
      summary: List all todo items
      description: Returns all todo items, optionally filtered by completion status.
      tags:
        - todos
      parameters:
        - name: isComplete
          in: query
          required: false
          schema:
            type: boolean
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TodoPriority'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
    post:
      operationId: createTodo
      summary: Create a new todo item
      description: Creates a new todo item and returns the created resource.
      tags:
        - todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - isComplete
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                isComplete:
                  type: boolean
                priority:
                  $ref: '#/components/schemas/TodoPriority'
                dueDate:
                  type: string
                  format: date
                  nullable: true
                metadata:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      value:
                        type: string
                      color:
                        type: string
                        nullable: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "400":
          description: Bad Request
          content:
            application/problem+json: {}
  /todos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getTodo
      summary: Get a specific todo item
      description: Returns the todo item with the specified identifier.
      tags:
        - todos
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "404":
          description: Not found
    put:
      operationId: updateTodo
      summary: Update an existing todo item
      description: Updates the title, description, completion status, or priority of a todo item.
      tags:
        - todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - isComplete
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                isComplete:
                  type: boolean
                priority:
                  $ref: '#/components/schemas/TodoPriority'
                dueDate:
                  type: string
                  format: date
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "400":
          description: Bad Request
        "404":
          description: Not found
    delete:
      operationId: deleteTodo
      summary: Delete a todo item
      description: Permanently removes the todo item with the specified identifier.
      tags:
        - todos
      responses:
        "204":
          description: No Content
        "404":
          description: Not found
  /todos/{id}/detail:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getTodoDetail
      summary: Get a todo item with audit information
      description: Returns the todo item together with an inline audit snapshot. The response schema is an inline allOf composition of the Todo component and an inline audit object.
      tags:
        - todos
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Todo'
                  - type: object
                    required:
                      - auditedAt
                    properties:
                      auditedAt:
                        type: string
                        format: date-time
        "404":
          description: Not found
  /todos/{id}/annotate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: annotateTodo
      summary: Add an annotation to a todo item
      description: Attaches an inline audit record plus a freeform note to the specified todo. The request body schema is an inline allOf composition of the TodoAudit component and an inline object carrying the note.
      tags:
        - todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/TodoAudit'
                - type: object
                  required:
                    - note
                  properties:
                    note:
                      type: string
                      maxLength: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "404":
          description: Not found
components:
  schemas:
    TodoPriority:
      type: string
      enum:
        - low
        - medium
        - high
    Todo:
      type: object
      required:
        - id
        - title
        - isComplete
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        isComplete:
          type: boolean
        priority:
          $ref: '#/components/schemas/TodoPriority'
        dueDate:
          type: string
          format: date
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: object
            properties:
              value:
                type: string
              color:
                type: string
                nullable: true
    TodoAudit:
      type: object
      required:
        - createdAt
        - source
      properties:
        createdAt:
          type: string
          format: date-time
        source:
          type: string
    TodoWithAudit:
      allOf:
        - $ref: '#/components/schemas/Todo'
        - $ref: '#/components/schemas/TodoAudit'
    TodoWithInlineTags:
      allOf:
        - $ref: '#/components/schemas/Todo'
        - type: object
          required:
            - tags
          properties:
            tags:
              type: array
              items:
                type: string
