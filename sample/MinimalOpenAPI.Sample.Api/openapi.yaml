openapi: "3.0.0"
info:
  title: Todo API
  version: "1.0.0"
paths:
  /todos:
    get:
      operationId: listTodos
      summary: List all todo items
      description: Returns all todo items, optionally filtered by completion status.
      tags:
        - todos
      parameters:
        - name: isComplete
          in: query
          required: false
          schema:
            type: boolean
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TodoPriority'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
    post:
      operationId: createTodo
      summary: Create a new todo item
      description: Creates a new todo item and returns the created resource.
      tags:
        - todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - isComplete
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                isComplete:
                  type: boolean
                priority:
                  $ref: '#/components/schemas/TodoPriority'
                dueDate:
                  type: string
                  format: date
                  nullable: true
                metadata:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      value:
                        type: string
                      color:
                        type: string
                        nullable: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "400":
          description: Bad Request
  /todos/{id}:
    get:
      operationId: getTodo
      summary: Get a specific todo item
      description: Returns the todo item with the specified identifier.
      tags:
        - todos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "404":
          description: Not found
    put:
      operationId: updateTodo
      summary: Update an existing todo item
      description: Updates the title, description, completion status, or priority of a todo item.
      tags:
        - todos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - isComplete
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                isComplete:
                  type: boolean
                priority:
                  $ref: '#/components/schemas/TodoPriority'
                dueDate:
                  type: string
                  format: date
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        "400":
          description: Bad Request
        "404":
          description: Not found
    delete:
      operationId: deleteTodo
      summary: Delete a todo item
      description: Permanently removes the todo item with the specified identifier.
      tags:
        - todos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not found
components:
  schemas:
    TodoPriority:
      type: string
      enum:
        - low
        - medium
        - high
    Todo:
      type: object
      required:
        - id
        - title
        - isComplete
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        isComplete:
          type: boolean
        priority:
          $ref: '#/components/schemas/TodoPriority'
        dueDate:
          type: string
          format: date
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: object
            properties:
              value:
                type: string
              color:
                type: string
                nullable: true
